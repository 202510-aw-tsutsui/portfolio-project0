<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - プロジェクトアーカイブ</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <button class="hamburger" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>

  <div class="page-wrapper">
    <aside class="sidebar" data-nav-level="root"></aside>

    <main class="main-content">
      <header class="doc-header">
        <div class="doc-category">CONTACT</div>
        <h1 class="doc-title">お問い合わせ</h1>
        <div class="doc-meta">
          <span><span class="material-symbols-outlined icon-sm">calendar_today</span> 作成日：2026-03-24</span>
          <span><span class="material-symbols-outlined icon-sm">person</span> 作成者：ツツイサリナ</span>
          <span><span class="material-symbols-outlined icon-sm">push_pin</span> Ver 1.0</span>
        </div>
      </header>

      <div class="doc-body">


        <section class="section">
          <h2 class="section-title"><span class="section-icon"><span
                class="material-symbols-outlined">mail</span></span> 連絡先</h2>

          <div class="fill-block">
            <div class="fill-label">メールアドレス <span class="required">必須</span></div>
            <div class="fill-hint"></div>
            <div class="fill-content">
              <p>sarina_0524@icloud.com</p>
            </div>
          </div>

        </section>

        <section class="section">
          <h2 class="section-title"><span class="section-icon"><span
                class="material-symbols-outlined">link</span></span> SNS・外部リンク</h2>

          <div class="card-grid">
            <div class="card">
              <div class="card-title"><span class="material-symbols-outlined icon-sm">code</span> GitHub</div>
              <div class="card-text">
                <p>ソースコード</p>
                <p><a href="https://github.com/" target="_blank"></a></p>
              </div>
            </div>
        </section>

        <section class="section">
          <h2 class="section-title"><span class="section-icon"><span
                class="material-symbols-outlined">schedule</span></span> 対応可能時間</h2>

          <div class="fill-block">
            <div class="fill-label">連絡対応について <span class="optional">任意</span></div>
            <div class="fill-content">
              <p><strong>対応可能時間：</strong>平日 10:00〜19:00</p>
              <p><strong>返信目安：</strong>2〜3営業日以内</p>
              <p>（上記以外も対応可能の場合がございます）</p>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
